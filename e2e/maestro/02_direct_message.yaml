appId: com.homenet.messenger
---
- launchApp
- extendedWaitUntil:
    visible: "Chats"
    timeout: 15000
- tapOn: "New Chat"
- assertVisible: "Start a chat"
- tapOn:
    id: "new-chat-user-id"
- inputText: "${TEST_USER_B_ID}"
- tapOn:
    id: "new-chat-create-direct"
- extendedWaitUntil:
    visible: "Encrypted message"
    timeout: 15000
- tapOn:
    id: "chat-message-input"
- inputText: "hello from maestro"
- tapOn:
    id: "chat-send"
- extendedWaitUntil:
    visible: "hello from maestro"
    timeout: 15000
